<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ZipGuard Controller App</title>

    <link rel="stylesheet" href="src/style.css">
    <link rel="icon" type="image/x-icon" href="assets/blue.ico?v=2">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>
    <header>

    <h1>Urban Secure Systems | ZipGuard</h1>

    <span id="status" class="status disconnected">
        Status: Disconnected
    </span>

    </header>


    <section class="connection-panel">

        <h2>Wireless Controller</h2>

        <button id="bleConnectBtn" class="connect-btn">
            Scan and Connect to Device via Bluetooth
        </button>

    </section>


    <section class="controls">

        <button id="lockBtn" class="btn lock-btn" disabled>
            LOCK
        </button>

        <button id="unlockBtn" class="btn unlock-btn" disabled>
            UNLOCK
        </button>

    </section>

    <h3 id="lockLbl">Mode: UNLOCKED</h3>

    <input type="text" id="txtBox" placeholder="Passcode">

    <h1 id="trackLbl">Keep track of your device!</h1>
    <h1>▼</h1>
    
    <button id="soundBtn" class="btn soundBtn" disabled>
        Play Sound for 5 Seconds
    </button>

    <h2 id="mapLbl">Device Location</h2>

    <div id="map" style="height: 500px; width: 65%; margin-top: 10px; margin-bottom: 60px;"></div>
    
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>

        let map = L.map('map').setView([40.7308705, -73.9977265], 15);

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
        }).addTo(map);

        let marker = L.marker([40.7308705, -73.9977265]).addTo(map);

        function updateLocation(lat, lng) {
            marker.setLatLng([lat, lng]);
            map.setView([lat, lng], 15);
        }

    </script>

    <script src="src/app.js"></script>

    <footer>
        <h2>© 2026 Urban Secure Systems.</h2>
        <h3>Project built by Ryan Chen, Ricky Jian, and Steven Zhang.</h3>
    </footer>

</body>
</html>
